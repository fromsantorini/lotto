name: Update lotto data

on:
  workflow_dispatch:
  schedule:
    # 03:10 every Sunday in Korea Standard Time.
    # GitHub Actions cron uses UTC, so this runs at 18:10 every Saturday UTC.
    - cron: "10 18 * * 6"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Diagnose official lotto API
        run: |
          node --version
          node -e "fetch('https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=1227',{headers:{accept:'application/json,text/plain,*/*','accept-language':'ko-KR,ko;q=0.9,en-US;q=0.8,en;q=0.7',referer:'https://www.dhlottery.co.kr/gameResult.do?method=byWin','user-agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0 Safari/537.36'}}).then(async r=>{const body=await r.text(); console.log('status=' + r.status); console.log('content-type=' + r.headers.get('content-type')); console.log(body.trim().slice(0,500)); if(!r.ok || !body.trim().startsWith('{')) process.exit(1);}).catch(e=>{console.error(e); process.exit(1);})"

      - name: Update lotto data
        run: node tools/update-lotto-data.mjs

      - name: Commit updated data
        run: |
          if git diff --quiet -- lotto-data.json; then
            echo "No lotto data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lotto-data.json
          git commit -m "Update lotto data"
          git push
