name: Update lotto data

on:
  workflow_dispatch:
  schedule:
    # 03:10 every Sunday in Korea Standard Time.
    # GitHub Actions cron uses UTC, so this runs at 18:10 every Saturday UTC.
    - cron: "10 18 * * 6"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update lotto data
        run: node tools/update-lotto-data.mjs

      - name: Commit updated data
        run: |
          if git diff --quiet -- lotto-data.json; then
            echo "No lotto data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lotto-data.json
          git commit -m "Update lotto data"
          git push
